name: custom_erp
description: "Flutter ERP – full-featured business management with Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.2
  shared_preferences: ^2.3.3
  pdf: ^3.11.3
  printing: ^5.14.2

  # UI helpers
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
